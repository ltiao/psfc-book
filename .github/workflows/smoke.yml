name: smoke
# End-to-end check: runs the scout command against the empty current week.
# Verifies secrets, python deps, login, calendar fetch, and artifact upload
# all work — without booking anything. Trigger manually any time.

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PSFC_USER: ${{ secrets.PSFC_USER }}
      PSFC_PASS: ${{ secrets.PSFC_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scout current week
        run: |
          ANCHOR=$(TZ=America/New_York date +%Y-%m-%d)
          python psfc_book.py scout --week 0 --anchor "$ANCHOR" --dump-dir ./psfc_dumps

      - name: Home-page recon
        run: |
          python psfc_book.py home --dump-dir ./psfc_dumps

      - name: Verify dump contents
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, pathlib
          dumps = pathlib.Path("psfc_dumps")
          scout = sorted(dumps.glob("*_scout_*"))[-1]
          home  = sorted(dumps.glob("*_home"))[-1]
          # scout must have calendar.html, shifts.json, meta.json with primed cookies + Welcome
          for f in ("calendar.html", "shifts.json", "meta.json"):
              assert (scout / f).exists(), f"missing {scout}/{f}"
          m = json.loads((scout / "meta.json").read_text())
          assert m.get("primed_csrf_tail"),    f"no csrf primed: {m}"
          assert m.get("primed_session_tail"), f"no session primed: {m}"
          html = (scout / "calendar.html").read_text()
          assert "Welcome" in html, "calendar HTML doesn't show logged-in user"
          # home must have home.html and upcoming.json
          for f in ("home.html", "upcoming.json"):
              assert (home / f).exists(), f"missing {home}/{f}"
          upcoming = json.loads((home / "upcoming.json").read_text())
          print(f"✓ scout: csrf …{m['primed_csrf_tail']}, session …{m['primed_session_tail']}")
          print(f"✓ home: {len(upcoming)} upcoming announcement(s) parsed")
          for it in upcoming:
              print(f"   • {it['orient_day']} {it['orient_date']}: "
                    f"{it['count']} appts → release {it['release_date']} {it['release_time']}")
          PY

      - name: Upload smoke dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dumps-${{ github.run_id }}
          path: psfc_dumps/
          retention-days: 7
