name: PSFC book
# Books a Park Slope Food Coop orientation slot at the release moment.
# Driven primarily by watcher.yml (which dispatches this with explicit
# inputs after detecting a release announced for today). The Mon/Thu
# cron is kept as belt-and-suspenders in case the watcher misses one.

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week offset (0 = current, 1 = next, …)'
        required: false
        default: '1'
      target:
        description: 'Day-label substring, e.g. 5/27/2026 (default: today + 13 days)'
        required: false
        default: ''
      anchor:
        description: 'Anchor date YYYY-MM-DD (default: today ET)'
        required: false
        default: ''
      fire_at:
        description: 'Fire-at YYYY-MM-DD HH:MM:SS (default: today 19:00:00 ET)'
        required: false
        default: ''
  schedule:
    # Mon and Thu at 22:17 UTC = 6:17 PM EDT.
    # Off-the-hour by design: GitHub Actions skips/delays scheduled triggers
    # most often at :00 and :30 (busy minutes). :17 is comfortably between.
    # NOTE: when DST ends in November, this becomes 5:17 PM EST — adjust to
    # '17 23 * * 1,4' for the EST half of the year.
    - cron: '17 22 * * 1,4'

concurrency:
  group: psfc-book
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PSFC_USER: ${{ secrets.PSFC_USER }}
      PSFC_PASS: ${{ secrets.PSFC_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve booking parameters
        id: dates
        # Inputs override; otherwise default to "today ET" semantics.
        run: |
          set -euo pipefail
          ANCHOR='${{ inputs.anchor }}'
          [ -z "$ANCHOR" ] && ANCHOR=$(TZ=America/New_York date +%Y-%m-%d)
          TARGET='${{ inputs.target }}'
          [ -z "$TARGET" ] && TARGET=$(TZ=America/New_York date -d '+13 days' +'%-m/%-d/%Y')
          FIRE_AT='${{ inputs.fire_at }}'
          [ -z "$FIRE_AT" ] && FIRE_AT="$ANCHOR 19:00:00"
          WEEK='${{ inputs.week }}'
          [ -z "$WEEK" ] && WEEK=1
          echo "anchor=$ANCHOR"   | tee -a "$GITHUB_OUTPUT"
          echo "target=$TARGET"   | tee -a "$GITHUB_OUTPUT"
          echo "fire_at=$FIRE_AT" | tee -a "$GITHUB_OUTPUT"
          echo "week=$WEEK"       | tee -a "$GITHUB_OUTPUT"

      - name: Book
        id: book
        run: |
          python psfc_book.py book \
            --week '${{ steps.dates.outputs.week }}' \
            --target '${{ steps.dates.outputs.target }}' \
            --anchor '${{ steps.dates.outputs.anchor }}' \
            --fire-at '${{ steps.dates.outputs.fire_at }}' \
            --tz America/New_York \
            --lead-ms 200 --poll-ms 80 --max-attempts 60 \
            --dump-dir ./psfc_dumps

      - name: Scout (post-mortem if booking missed)
        if: failure()
        run: |
          python psfc_book.py scout \
            --week '${{ steps.dates.outputs.week }}' \
            --anchor '${{ steps.dates.outputs.anchor }}' \
            --target '${{ steps.dates.outputs.target }}' \
            --dump-dir ./psfc_dumps

      - name: Upload dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psfc-dumps-${{ github.run_id }}
          path: psfc_dumps/
          retention-days: 30
