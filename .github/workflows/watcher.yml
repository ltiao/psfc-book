name: PSFC watcher
# Daily check of the home page for "Upcoming Orientations" entries scheduled
# to release today. When one is found, dispatches book.yml with the right
# week / target / anchor / fire-at inputs. Most days find nothing and exit
# cleanly in a few seconds.

on:
  workflow_dispatch:
  schedule:
    # Daily at 22:23 UTC = 6:23 PM EDT (5:23 PM EST).
    # ~37 min before the 7 PM ET release moment, so book.yml dispatched
    # by this watcher only has to busy-wait under 40 min and stays well
    # within its 60-minute timeout. Off-the-hour minute (:23 not :30/:00)
    # for scheduler reliability.
    # NOTE: when DST ends in November, this fires 5:23 PM EST instead of
    # 6:23 PM EDT, which is still fine — releases stay at 7 PM ET.
    - cron: '23 22 * * *'

permissions:
  actions: write       # required for `gh workflow run book.yml`
  contents: read

concurrency:
  group: psfc-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PSFC_USER: ${{ secrets.PSFC_USER }}
      PSFC_PASS: ${{ secrets.PSFC_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Detect today's release (if any)
        id: detect
        run: |
          python psfc_book.py watch --dump-dir ./psfc_dumps

      - name: Dispatch book.yml
        if: steps.detect.outputs.release_today == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run book.yml \
            -f week='${{ steps.detect.outputs.week }}' \
            -f target='${{ steps.detect.outputs.target }}' \
            -f anchor='${{ steps.detect.outputs.anchor }}' \
            -f fire_at='${{ steps.detect.outputs.fire_at }}'
          echo "Dispatched book.yml for ${{ steps.detect.outputs.target }} at ${{ steps.detect.outputs.fire_at }}"

      - name: Upload dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watcher-${{ github.run_id }}
          path: psfc_dumps/
          retention-days: 14
